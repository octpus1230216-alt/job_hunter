<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 220px; padding: 12px; font-family: sans-serif; font-size: 13px; }
    .title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .status { color: #666; margin-bottom: 12px; }
    .btn { width: 100%; padding: 8px; margin: 4px 0; border: none; border-radius: 6px;
           cursor: pointer; font-size: 13px; color: white; }
    .btn-green { background: #07c160; }
    .btn-blue { background: #1890ff; }
    .btn:hover { opacity: 0.85; }
    .count { font-size: 20px; font-weight: 700; color: #07c160; text-align: center; margin: 8px 0; }
    .note { font-size: 11px; color: #999; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <div class="title">🔍 职位猎手</div>
  <div class="status" id="status">API拦截模式</div>
  <div class="count" id="count">0</div>
  <div style="text-align:center;font-size:11px;color:#999">已采集</div>

  <button class="btn btn-green" id="btnCollect">🔄 触发重新搜索</button>
  <button class="btn btn-blue" id="btnScanAll">📄 自动翻页</button>
  <button class="btn" style="background:#999" id="btnClear">🗑 清除</button>

  <div class="note">API自动拦截中 · 先运行 collector_server.py</div>

  <script src="popup.js"></script>
</body>
</html>
