# Streamlit 服务器配置

[server]
address = "0.0.0.0"
port = 8501
headless = true

[runner]
fastReruns = false

# 不收集使用统计
[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#1890ff"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f5f5"
textColor = "#333333"
font = "sans serif"

[client]
toolbarMode = "minimal"

[logger]
level = "info"
