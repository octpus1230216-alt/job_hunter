name: Build Desktop Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-desktop.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller packaging/desktop.spec --noconfirm --clean

      - name: Debug: check environment
        run: |
          echo "=== makensis version ==="
          makensis /VERSION
          echo "=== CMD version ==="
          ver
          echo "=== dist contents ==="
          dir /s /b dist 2>&1 || echo "dist not found"
          echo "=== dist/job_hunter contents ==="
          dir /s /b dist\job_hunter 2>&1 || echo "dist/job_hunter not found"
          echo "=== CWD ==="
          cd
          echo "=== packaging/installer.nsi exists ==="
          if exist packaging\installer.nsi (echo YES) else (echo NO)
          echo "=== installer.nsi first 5 lines ==="
          powershell -Command "Get-Content packaging\installer.nsi -TotalCount 5"

      - name: Build NSIS installer
        run: |
          makensis -V2 packaging/installer.nsi > nsis-build.log 2>&1
          echo "NSIS exit code: %ERRORLEVEL%"
          type nsis-build.log

      - name: Upload NSIS build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nsis-debug-log
          path: nsis-build.log

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: job_hunter-setup
          path: dist/job_hunter-setup.exe

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/job_hunter-setup.exe
