name: Build Desktop Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-desktop.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller packaging/desktop.spec --noconfirm --clean

      - name: List dist directory
        run: dir /s /b dist

      - name: Build NSIS installer
        run: makensis -V2 packaging/installer.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: job_hunter-setup
          path: dist/job_hunter-setup.exe

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/job_hunter-setup.exe
